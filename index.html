<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game</title>
</head>
<body>
    <script>
        class Player {
            constructor(name) {
                this.name = name;
                this.health = 100;
            }

            attack(enemy) {
                enemy.health -= 10;
                console.log(`${this.name} attacks ${enemy.name}. ${enemy.name} has ${enemy.health} health left.`);
            }
        }

        class Enemy {
            constructor(name) {
                this.name = name;
                this.health = 100;
            }

            attack(player) {
                player.health -= 10;
                console.log(`${this.name} attacks ${player.name}. ${player.name} has ${player.health} health left.`);
            }
        }

        const keys = {}; // Fixed keys variable

        const player1 = new Player('Hero');
        const enemy1 = new Enemy('Villain');

        player1.attack(enemy1);
        enemy1.attack(player1);
    </script>
</body>
</html>
